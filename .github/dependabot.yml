version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # eslint 10 (major) is not yet supported by the Next.js lint stack:
      # eslint-config-next still depends on eslint-plugin-react (<=7.37.5),
      # which calls the context.getFilename() API removed in ESLint 10.
      # Re-enable once eslint-config-next ships an ESLint 10 compatible release.
      - dependency-name: "eslint"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
